<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3150"/>
      <stop offset="1" stop-color="#171a2b"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfe4ee"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fdcff"/>
      <stop offset="1" stop-color="#4fb0ff"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <g filter="url(#soft)">
    <!-- speaker: driver box + cone -->
    <path d="M150,300 V212 H206 L292,140 V372 L206,300 Z"
      fill="url(#cool)" stroke="#0f1220" stroke-opacity="0.18" stroke-width="4"
      stroke-linejoin="round"/>
    <!-- sound waves, opening right -->
    <g fill="none" stroke="url(#wave)" stroke-width="26" stroke-linecap="round">
      <path d="M330,196 A96 96 0 0 1 330,316"/>
      <path d="M372,158 A160 160 0 0 1 372,354"/>
    </g>
  </g>
</svg>
